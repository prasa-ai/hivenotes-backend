name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  IMAGE_NAME: hivenotes-backend
  CONTAINER_APP_NAME: ca-hivenotes
  RESOURCE_GROUP: rg-hivenotes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container App
        # Workaround for Azure CLI 2.85.0 bug: `az containerapp up/update` crashes
        # when the existing app's template.containers is null in the ARM response
        # (TypeError: 'NoneType' object is not iterable / has no len()).
        # We bypass the broken CLI code path by PATCHing the ARM resource directly.
        run: |
          SUB=$(az account show --query id -o tsv)
          IMAGE="${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          az rest --method PATCH \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.App/containerApps/${{ env.CONTAINER_APP_NAME }}?api-version=2024-03-01" \
            --headers "Content-Type=application/json" \
            --body "{
              \"properties\": {
                \"configuration\": {
                  \"ingress\": {\"external\": true, \"targetPort\": 8000},
                  \"registries\": [{
                    \"server\": \"${{ secrets.REGISTRY_LOGIN_SERVER }}\",
                    \"username\": \"${{ secrets.REGISTRY_USERNAME }}\",
                    \"passwordSecretRef\": \"registry-password\"
                  }]
                },
                \"template\": {
                  \"containers\": [{
                    \"name\": \"${{ env.CONTAINER_APP_NAME }}\",
                    \"image\": \"${IMAGE}\"
                  }]
                }
              }
            }"
