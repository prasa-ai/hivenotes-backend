name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

env:
  IMAGE_NAME: hivenotes-backend
  CONTAINER_APP_NAME: ca-hivenotes
  RESOURCE_GROUP: rg-hivenotes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container App
        # Workaround for Azure CLI 2.85.0 bug: `az containerapp up/update` crashes
        # when the existing app's template.containers is null in the ARM response
        # (TypeError: 'NoneType' object is not iterable / has no len()).
        # We bypass the broken CLI code path by GETting the current spec, patching
        # only the image with jq, then re-applying the full spec via PATCH.
        # This preserves all existing environment variables set on the container app.
        run: |
          SUB=$(az account show --query id -o tsv)
          IMAGE="${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          ARM_URL="https://management.azure.com/subscriptions/${SUB}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.App/containerApps/${{ env.CONTAINER_APP_NAME }}?api-version=2024-03-01"

          # Fetch current app spec so we can preserve env vars, scaling rules, etc.
          CURRENT=$(az rest --method GET --url "${ARM_URL}")

          # Update only the image of the first container; leave everything else intact.
          PATCHED=$(echo "${CURRENT}" | jq --arg img "${IMAGE}" \
            '.properties.template.containers[0].image = $img
             | del(.systemData, .identity.userAssignedIdentities[]?.clientSecretUrl)')

          az rest --method PATCH \
            --url "${ARM_URL}" \
            --headers "Content-Type=application/json" \
            --body "${PATCHED}"
